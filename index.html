<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Catan Dice">
  <meta name="theme-color" content="#f7f2e8">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>Catan Dice</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f2e8;
      --die-bg: #ffffff;
      --pip: #1c1c1e;
      --text: #1c1c1e;
      --subtle: #8e8e93;
      --red: #c0392b;
      --size: 130px;
      --half: 65px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      touch-action: manipulation;
    }

    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      height: 100dvh;
      padding-top: max(env(safe-area-inset-top), 24px);
      padding-bottom: max(env(safe-area-inset-bottom), 24px);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    header {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--subtle);
    }

    #roll-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 52px;
      padding: 48px;
      cursor: pointer;
    }

    #dice-row {
      display: flex;
      gap: 32px;
      align-items: center;
    }

    .die-wrapper {
      width: var(--size);
      height: var(--size);
      perspective: 520px;
    }

    .cube {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transform: rotateX(0deg) rotateY(0deg);
      transition: transform 0.75s cubic-bezier(0.22, 0.61, 0.36, 1);
      will-change: transform;
    }

    .face {
      position: absolute;
      inset: 0;
      background: var(--die-bg);
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
      /* shadow only meaningful on front-facing face; accepted visual trade-off */
      box-shadow:
        0 2px 8px rgba(0,0,0,0.06),
        0 8px 28px rgba(0,0,0,0.13),
        inset 0 1px 0 rgba(255,255,255,0.9);
    }

    .face-1 { transform: translateZ(var(--half)); }
    .face-2 { transform: rotateY(180deg) translateZ(var(--half)); }
    .face-3 { transform: rotateY(90deg)  translateZ(var(--half)); }
    .face-4 { transform: rotateY(-90deg) translateZ(var(--half)); }
    .face-5 { transform: rotateX(-90deg) translateZ(var(--half)); }
    .face-6 { transform: rotateX(90deg)  translateZ(var(--half)); }

    .pip-grid {
      display: grid;
      grid-template: repeat(3, 1fr) / repeat(3, 1fr);
      width: 76%;
      height: 76%;
    }

    .pip-grid span {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pip::after {
      content: '';
      display: block;
      width: 58%;
      aspect-ratio: 1;
      border-radius: 50%;
      background: var(--pip);
      box-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }

    #sum {
      font-size: 88px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.03em;
      min-width: 110px;
      text-align: center;
      color: var(--text);
      transition: opacity 0.15s, transform 0.15s;
    }

    #sum.rolling {
      opacity: 0.15;
      transform: scale(0.92);
    }

    #hint {
      font-size: 15px;
      color: var(--subtle);
      letter-spacing: 0.01em;
    }
  </style>
</head>
<body>
  <div id="app">
    <header>Catan Dice</header>

    <div id="roll-area">
      <div id="dice-row">
        <div class="die-wrapper"><div class="cube" id="cube1"></div></div>
        <div class="die-wrapper"><div class="cube" id="cube2"></div></div>
      </div>
      <div id="sum">—</div>
    </div>

    <div id="hint">Tap to roll</div>
  </div>

  <script>
    // ── Pip layout per face value ──────────────────────────────────────────────
    const PIPS = {
      1: [[1,1]],
      2: [[0,2],[2,0]],
      3: [[0,2],[1,1],[2,0]],
      4: [[0,0],[0,2],[2,0],[2,2]],
      5: [[0,0],[0,2],[1,1],[2,0],[2,2]],
      6: [[0,0],[0,2],[1,0],[1,2],[2,0],[2,2]],
    };

    function buildCube(el) {
      for (let v = 1; v <= 6; v++) {
        const face = document.createElement('div');
        face.className = `face face-${v}`;
        const grid = document.createElement('div');
        grid.className = 'pip-grid';
        for (let r = 0; r < 3; r++) {
          for (let c = 0; c < 3; c++) {
            const cell = document.createElement('span');
            if (PIPS[v].some(([pr, pc]) => pr === r && pc === c)) cell.className = 'pip';
            grid.appendChild(cell);
          }
        }
        face.appendChild(grid);
        el.appendChild(face);
      }
    }

    // ── 3D rotation map: cube rotation needed to show each face toward viewer ──
    // Verified: viewer looks in -Z; each face placed with rotateAxis(deg) translateZ(half)
    const FACE_ROT = {
      1: { x:   0, y:   0 },  // front  (+Z normal)  → no rotation
      2: { x:   0, y: 180 },  // back   (-Z normal)  → rotateY(180)
      3: { x:   0, y: -90 },  // right  (+X normal)  → rotateY(-90)
      4: { x:   0, y:  90 },  // left   (-X normal)  → rotateY(90)
      5: { x:  90, y:   0 },  // top    (+Y normal)  → rotateX(90)  [rotateX(90): +Y→+Z]
      6: { x: -90, y:   0 },  // bottom (-Y normal)  → rotateX(-90) [-Y→+Z]
    };

    function rotateTo(cubeEl, state, face) {
      const cur = FACE_ROT[state.face];
      const tgt = FACE_ROT[face];
      // Add 3 full rotations (1080°) on each axis for the rolling spin effect.
      // Accumulating absolute degrees avoids gimbal issues with CSS transitions.
      state.x += (tgt.x - cur.x) + 1080;
      state.y += (tgt.y - cur.y) + 1080;
      state.face = face;
      cubeEl.style.transform = `rotateX(${state.x}deg) rotateY(${state.y}deg)`;
    }

    // ── Balanced pool (draw-without-replacement over all 36 combinations × mult) ─
    const MULT = 3; // pool = 108 entries; gentle balancing for ~120-roll Catan game

    function freshPool() {
      const pool = [];
      for (let d1 = 1; d1 <= 6; d1++)
        for (let d2 = 1; d2 <= 6; d2++)
          for (let i = 0; i < MULT; i++)
            pool.push([d1, d2]);
      return pool;
    }

    function drawRoll(pool) {
      if (pool.length === 0) pool.push(...freshPool());
      const i = Math.floor(Math.random() * pool.length);
      return pool.splice(i, 1)[0];
    }

    // ── State persistence ─────────────────────────────────────────────────────
    const KEY = 'catan-dice-v1';

    function loadPool() {
      try { return JSON.parse(localStorage.getItem(KEY))?.pool ?? null; } catch { return null; }
    }

    function savePool(pool) {
      try { localStorage.setItem(KEY, JSON.stringify({ pool })); } catch {}
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    const cube1 = document.getElementById('cube1');
    const cube2 = document.getElementById('cube2');
    const sumEl  = document.getElementById('sum');

    buildCube(cube1);
    buildCube(cube2);

    const s1 = { x: 0, y: 0, face: 1 };
    const s2 = { x: 0, y: 0, face: 1 };
    let pool = loadPool() ?? freshPool();
    let locked = false;

    document.getElementById('roll-area').addEventListener('click', () => {
      if (locked) return;
      locked = true;

      const [d1, d2] = drawRoll(pool);
      savePool(pool);

      sumEl.classList.add('rolling');
      rotateTo(cube1, s1, d1);
      rotateTo(cube2, s2, d2);

      setTimeout(() => {
        const total = d1 + d2;
        sumEl.textContent = total;
        // 7 triggers the robber in Catan — highlight it
        sumEl.style.color = total === 7 ? 'var(--red)' : 'var(--text)';
        sumEl.classList.remove('rolling');
        locked = false;
      }, 800);
    });

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
  </script>
</body>
</html>
