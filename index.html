<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Catan Dice">
  <meta name="theme-color" content="#f7f2e8">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>Catan Dice</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="stylesheet" href="./catan.css">
</head>
<body>
  <div id="app">
    <header>Catan Dice</header>

    <div id="roll-area">
      <div id="dice-row"></div>
      <div id="sum">—</div>
    </div>

    <div id="footer">
      <button class="footer-btn" id="settings-btn">Settings</button>
      <span id="hint">Tap to roll</span>
      <button class="footer-btn" id="stats-btn">Stats</button>
    </div>
  </div>

  <div id="panel-backdrop"></div>

  <div class="panel" id="stats-panel">
    <div class="panel-handle" id="stats-handle"></div>
    <div class="panel-title" id="stats-title">Statistics</div>
    <div class="panel-scroll">
      <div id="chart-wrap"><div id="chart"></div></div>
      <div id="chart-legend">
        <div class="legend-item"><div class="legend-swatch theo"></div>Expected</div>
        <div class="legend-item"><div class="legend-swatch actual"></div>Actual</div>
      </div>
      <div id="history-header">Roll History</div>
      <div id="history-list"></div>
      <button id="reset-btn">New Game</button>
    </div>
  </div>

  <div class="panel" id="settings-panel">
    <div class="panel-handle" id="settings-handle"></div>
    <div class="panel-title">Settings</div>
    <div class="panel-scroll">
      <div class="settings-section">
        <span class="settings-label">Number of dice</span>
        <div class="stepper">
          <button class="step-btn" id="dice-minus">−</button>
          <span id="dice-count-display">2</span>
          <button class="step-btn" id="dice-plus">+</button>
        </div>
      </div>
      <div class="settings-section">
        <span class="settings-label">Die type</span>
        <div class="die-type-btns">
          <button class="die-type-btn" data-s="4">d4</button>
          <button class="die-type-btn active" data-s="6">d6</button>
          <button class="die-type-btn" data-s="8">d8</button>
          <button class="die-type-btn" data-s="10">d10</button>
          <button class="die-type-btn" data-s="12">d12</button>
          <button class="die-type-btn" data-s="20">d20</button>
        </div>
      </div>
      <div class="settings-section">
        <span class="settings-label">Balancing</span>
        <div class="stepper">
          <button class="step-btn" id="mult-minus">−</button>
          <span id="mult-display">3×</span>
          <button class="step-btn" id="mult-plus">+</button>
        </div>
        <span class="mult-hint" id="mult-hint">Balanced</span>
      </div>
      <div class="settings-section" id="catan-settings-slot"></div>
      <div class="settings-section" id="die-bg-section"></div>
      <div class="settings-section">
        <span class="settings-label">Pip color</span>
        <div class="swatch-row" id="pip-swatches"></div>
      </div>
      <div class="settings-section">
        <span class="settings-label">Background</span>
        <div class="swatch-row" id="bg-swatches"></div>
      </div>
      <div class="settings-section">
        <span class="settings-label">Roll sound</span>
        <div class="die-type-btns" id="sound-btns">
          <button class="die-type-btn" data-sound="wood">Wood</button>
          <button class="die-type-btn" data-sound="plastic">Plastic</button>
          <button class="die-type-btn active" data-sound="none">None</button>
        </div>
      </div>
      <button id="settings-apply">Apply</button>
      <p style="text-align:center;font-size:11px;color:var(--subtle);margin-top:16px;margin-bottom:0">v1.3</p>
    </div>
  </div>

  <div id="confirm-overlay">
    <div id="confirm-card">
      <h2></h2>
      <p></p>
      <div class="confirm-btns">
        <button id="btn-cancel">Cancel</button>
        <button id="btn-confirm-reset">Reset</button>
      </div>
    </div>
  </div>

  <script src="./catan.js"></script>
  <script src="./app.js"></script>
</body>
</html>
