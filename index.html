<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Catan Dice">
  <meta name="theme-color" content="#f7f2e8">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>Catan Dice</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f2e8;
      --die-bg: #ffffff;
      --pip: #1c1c1e;
      --text: #1c1c1e;
      --subtle: #8e8e93;
      --red: #c0392b;
      --size: 130px;
      --half: 65px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      touch-action: manipulation;
    }

    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      height: 100dvh;
      padding-top: max(env(safe-area-inset-top), 24px);
      padding-bottom: max(env(safe-area-inset-bottom), 24px);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    header {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--subtle);
    }

    #roll-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 52px;
      padding: 48px;
      cursor: pointer;
    }

    #dice-row {
      display: flex;
      align-items: center;
    }

    .die-wrapper {
      width: var(--size);
      height: var(--size);
      perspective: 520px;
    }

    .cube {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transform: rotateX(0deg) rotateY(0deg);
      transition: transform 0.75s cubic-bezier(0.22, 0.61, 0.36, 1);
      will-change: transform;
    }

    .face {
      position: absolute;
      inset: 0;
      background: var(--die-bg);
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
      /* shadow only meaningful on front-facing face; accepted visual trade-off */
      box-shadow:
        0 2px 8px rgba(0,0,0,0.06),
        0 8px 28px rgba(0,0,0,0.13),
        inset 0 1px 0 rgba(255,255,255,0.9);
    }

    .face-1 { transform: translateZ(var(--half)); }
    .face-2 { transform: rotateY(180deg) translateZ(var(--half)); }
    .face-3 { transform: rotateY(90deg)  translateZ(var(--half)); }
    .face-4 { transform: rotateY(-90deg) translateZ(var(--half)); }
    .face-5 { transform: rotateX(-90deg) translateZ(var(--half)); }
    .face-6 { transform: rotateX(90deg)  translateZ(var(--half)); }

    .pip-grid {
      display: grid;
      grid-template: repeat(3, 1fr) / repeat(3, 1fr);
      width: 76%;
      height: 76%;
    }

    .pip-grid span {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pip::after {
      content: '';
      display: block;
      width: 58%;
      aspect-ratio: 1;
      border-radius: 50%;
      background: var(--pip);
      box-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }

    .die-number {
      font-size: calc(var(--size) * 0.38);
      font-weight: 700;
      color: var(--pip);
      line-height: 1;
    }

    #sum {
      font-size: 88px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.03em;
      min-width: 110px;
      text-align: center;
      color: var(--text);
      transition: opacity 0.15s, transform 0.15s;
    }

    #sum.rolling {
      opacity: 0.15;
      transform: scale(0.92);
    }

    #footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 0 28px;
    }

    .footer-btn {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--subtle);
      background: none;
      border: none;
      padding: 8px 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    #hint {
      font-size: 15px;
      color: var(--subtle);
      letter-spacing: 0.01em;
    }

    /* Bottom sheet panels */
    #panel-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.2);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s;
    }

    #panel-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }

    .panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg);
      border-radius: 20px 20px 0 0;
      box-shadow: 0 -4px 32px rgba(0,0,0,0.14);
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
      display: flex;
      flex-direction: column;
      padding-bottom: max(env(safe-area-inset-bottom), 24px);
    }

    .panel.open { transform: translateY(0); }

    #stats-panel    { height: 72dvh; }
    #settings-panel { height: auto; max-height: 60dvh; }

    .panel-handle {
      width: 36px;
      height: 4px;
      background: rgba(0,0,0,0.18);
      border-radius: 2px;
      margin: 12px auto 0;
      flex-shrink: 0;
      cursor: pointer;
    }

    .panel-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--subtle);
      text-align: center;
      padding: 14px 0 10px;
      flex-shrink: 0;
    }

    .panel-scroll {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 0 20px 16px;
    }

    /* Chart */
    #chart-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin-bottom: 4px;
    }

    #chart {
      display: flex;
      gap: 4px;
      min-width: min-content;
    }

    .chart-col {
      flex: 1;
      min-width: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .chart-bar-area {
      height: 110px;
      width: 100%;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 2px;
    }

    .bar-theo {
      flex: 1;
      background: rgba(0,0,0,0.1);
      border-radius: 3px 3px 0 0;
    }

    .bar-actual {
      flex: 1;
      background: var(--pip);
      border-radius: 3px 3px 0 0;
    }

    .chart-lbl {
      font-size: 10px;
      color: var(--subtle);
      font-weight: 500;
      margin-top: 3px;
      line-height: 14px;
    }

    .chart-lbl.seven { color: var(--red); font-weight: 700; }

    #chart-legend {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-bottom: 20px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--subtle);
    }

    .legend-swatch {
      width: 10px;
      height: 10px;
      border-radius: 2px;
    }

    .legend-swatch.theo   { background: rgba(0,0,0,0.1); }
    .legend-swatch.actual { background: var(--pip); }

    /* History */
    #history-header {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--subtle);
      margin-bottom: 8px;
    }

    .history-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(0,0,0,0.07);
      font-size: 17px;
    }

    .hist-dice { color: var(--subtle); }
    .hist-sum  { font-weight: 600; color: var(--text); }
    .hist-sum.seven { color: var(--red); }

    .no-rolls {
      text-align: center;
      color: var(--subtle);
      font-size: 15px;
      padding: 24px 0;
    }

    #reset-btn {
      display: block;
      width: 100%;
      margin-top: 24px;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      color: var(--red);
      background: none;
      border: 1.5px solid var(--red);
      border-radius: 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* Settings */
    .settings-section { margin-bottom: 20px; }

    .settings-label {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--subtle);
      display: block;
      margin-bottom: 12px;
    }

    .stepper {
      display: flex;
      align-items: center;
      background: rgba(0,0,0,0.06);
      border-radius: 12px;
      overflow: hidden;
      width: fit-content;
    }

    .step-btn {
      width: 44px;
      height: 44px;
      font-size: 22px;
      font-weight: 300;
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .step-btn:disabled { opacity: 0.3; }

    #dice-count-display {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      width: 32px;
      text-align: center;
    }

    .die-type-btns {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .die-type-btn {
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      color: var(--subtle);
      background: rgba(0,0,0,0.06);
      border: 1.5px solid transparent;
      border-radius: 10px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .die-type-btn.active {
      color: var(--text);
      background: var(--die-bg);
      border-color: var(--pip);
    }

    #settings-apply {
      display: block;
      width: 100%;
      margin-top: 8px;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      color: var(--die-bg);
      background: var(--pip);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* Confirmation modal */
    #confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 100;
    }

    #confirm-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    #confirm-card {
      background: var(--bg);
      border-radius: 20px;
      padding: 28px 24px 20px;
      width: 100%;
      max-width: 320px;
      text-align: center;
    }

    #confirm-card h2 {
      font-size: 19px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    #confirm-card p {
      font-size: 15px;
      color: var(--subtle);
      margin-bottom: 24px;
      line-height: 1.4;
    }

    .confirm-btns {
      display: flex;
      gap: 10px;
    }

    .confirm-btns button {
      flex: 1;
      padding: 13px;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    #btn-cancel       { background: rgba(0,0,0,0.08); color: var(--text); }
    #btn-confirm-reset { background: var(--red); color: #fff; }
  </style>
</head>
<body>
  <div id="app">
    <header>Catan Dice</header>

    <div id="roll-area">
      <div id="dice-row"></div>
      <div id="sum">—</div>
    </div>

    <div id="footer">
      <button class="footer-btn" id="settings-btn">Settings</button>
      <span id="hint">Tap to roll</span>
      <button class="footer-btn" id="stats-btn">Stats</button>
    </div>
  </div>

  <div id="panel-backdrop"></div>

  <div class="panel" id="stats-panel">
    <div class="panel-handle" id="stats-handle"></div>
    <div class="panel-title" id="stats-title">Statistics</div>
    <div class="panel-scroll">
      <div id="chart-wrap"><div id="chart"></div></div>
      <div id="chart-legend">
        <div class="legend-item"><div class="legend-swatch theo"></div>Expected</div>
        <div class="legend-item"><div class="legend-swatch actual"></div>Actual</div>
      </div>
      <div id="history-header">Roll History</div>
      <div id="history-list"></div>
      <button id="reset-btn">New Game</button>
    </div>
  </div>

  <div class="panel" id="settings-panel">
    <div class="panel-handle" id="settings-handle"></div>
    <div class="panel-title">Settings</div>
    <div class="panel-scroll">
      <div class="settings-section">
        <span class="settings-label">Number of dice</span>
        <div class="stepper">
          <button class="step-btn" id="dice-minus">−</button>
          <span id="dice-count-display">2</span>
          <button class="step-btn" id="dice-plus">+</button>
        </div>
      </div>
      <div class="settings-section">
        <span class="settings-label">Die type</span>
        <div class="die-type-btns" id="die-type-btns">
          <button class="die-type-btn" data-s="4">d4</button>
          <button class="die-type-btn active" data-s="6">d6</button>
          <button class="die-type-btn" data-s="8">d8</button>
          <button class="die-type-btn" data-s="10">d10</button>
          <button class="die-type-btn" data-s="12">d12</button>
          <button class="die-type-btn" data-s="20">d20</button>
        </div>
      </div>
      <button id="settings-apply">Apply</button>
    </div>
  </div>

  <div id="confirm-overlay">
    <div id="confirm-card">
      <h2>New game?</h2>
      <p>All rolls and history will be cleared.</p>
      <div class="confirm-btns">
        <button id="btn-cancel">Cancel</button>
        <button id="btn-confirm-reset">Reset</button>
      </div>
    </div>
  </div>

  <script>
    // ── Pip layout per face value ──────────────────────────────────────────────
    const PIPS = {
      1: [[1,1]],
      2: [[0,2],[2,0]],
      3: [[0,2],[1,1],[2,0]],
      4: [[0,0],[0,2],[2,0],[2,2]],
      5: [[0,0],[0,2],[1,1],[2,0],[2,2]],
      6: [[0,0],[0,2],[1,0],[1,2],[2,0],[2,2]],
    };

    function buildCube(el, sides) {
      el.innerHTML = '';
      for (let v = 1; v <= 6; v++) {
        const face = document.createElement('div');
        face.className = `face face-${v}`;
        if (sides === 6) {
          const grid = document.createElement('div');
          grid.className = 'pip-grid';
          for (let r = 0; r < 3; r++) {
            for (let c = 0; c < 3; c++) {
              const cell = document.createElement('span');
              if (PIPS[v].some(([pr, pc]) => pr === r && pc === c)) cell.className = 'pip';
              grid.appendChild(cell);
            }
          }
          face.appendChild(grid);
        } else {
          const num = document.createElement('span');
          num.className = 'die-number';
          num.textContent = v; // placeholder; overwritten on each roll
          face.appendChild(num);
        }
        el.appendChild(face);
      }
    }

    // ── 3D rotation map: cube rotation needed to show each face toward viewer ──
    // Verified: viewer looks in -Z; each face placed with rotateAxis(deg) translateZ(half)
    const FACE_ROT = {
      1: { x:   0, y:   0 },  // front  (+Z normal)
      2: { x:   0, y: 180 },  // back   (-Z normal)
      3: { x:   0, y: -90 },  // right  (+X normal)
      4: { x:   0, y:  90 },  // left   (-X normal)
      5: { x:  90, y:   0 },  // top    (+Y normal)
      6: { x: -90, y:   0 },  // bottom (-Y normal)
    };

    function rotateTo(cubeEl, state, face) {
      const cur = FACE_ROT[state.face];
      const tgt = FACE_ROT[face];
      // Accumulating absolute degrees avoids gimbal issues with CSS transitions.
      state.x += (tgt.x - cur.x) + 1080;
      state.y += (tgt.y - cur.y) + 1080;
      state.face = face;
      cubeEl.style.transform = `rotateX(${state.x}deg) rotateY(${state.y}deg)`;
    }

    // ── Balanced pool ─────────────────────────────────────────────────────────
    const MULT = 3;

    function freshPool() {
      // For very large combination spaces, skip enumeration — drawRoll falls back to random
      if (Math.pow(cfg.s, cfg.n) > 5000) return [];
      function combos(n) {
        if (n === 0) return [[]];
        return combos(n - 1).flatMap(c =>
          Array.from({ length: cfg.s }, (_, i) => [...c, i + 1])
        );
      }
      const all = combos(cfg.n);
      const pool = [];
      for (let m = 0; m < MULT; m++) pool.push(...all.map(c => [...c]));
      return pool;
    }

    function drawRoll(pool) {
      if (pool.length === 0) {
        if (Math.pow(cfg.s, cfg.n) > 5000)
          return Array.from({ length: cfg.n }, () => Math.ceil(Math.random() * cfg.s));
        pool.push(...freshPool());
      }
      const i = Math.floor(Math.random() * pool.length);
      return pool.splice(i, 1)[0];
    }

    // ── State persistence ─────────────────────────────────────────────────────
    const KEY = 'catan-dice-v1';

    function loadState() {
      try {
        const s = JSON.parse(localStorage.getItem(KEY));
        return {
          pool:    s?.pool    ?? null,
          history: s?.history ?? [],
          cfg:     s?.cfg     ?? { n: 2, s: 6 },
        };
      } catch { return { pool: null, history: [], cfg: { n: 2, s: 6 } }; }
    }

    function saveState(pool, history) {
      try { localStorage.setItem(KEY, JSON.stringify({ pool, history, cfg })); } catch {}
    }

    // ── Theoretical distribution via DP ───────────────────────────────────────
    function computeTheo(n, s) {
      let dp = { 0: 1 };
      for (let d = 0; d < n; d++) {
        const next = {};
        for (const [sum, ways] of Object.entries(dp))
          for (let v = 1; v <= s; v++) {
            const ns = +sum + v;
            next[ns] = (next[ns] || 0) + ways;
          }
        dp = next;
      }
      const total = Math.pow(s, n);
      const result = {};
      for (const [sum, ways] of Object.entries(dp)) result[+sum] = ways / total;
      return result;
    }

    const BAR_H = 100; // px, normalized max bar height

    function renderStats() {
      const theo    = computeTheo(cfg.n, cfg.s);
      const minSum  = cfg.n;
      const maxSum  = cfg.n * cfg.s;
      const isCatan = cfg.n === 2 && cfg.s === 6;
      const total   = history.length;

      const counts = {};
      for (let s = minSum; s <= maxSum; s++) counts[s] = 0;
      history.forEach(vs => counts[vs.reduce((a, b) => a + b, 0)]++);

      const maxTheo   = Math.max(...Object.values(theo));
      const maxActual = total > 0 ? Math.max(...Object.values(counts).map(c => c / total)) : 0;
      const scale     = Math.max(maxTheo, maxActual);

      const chartEl = document.getElementById('chart');
      chartEl.innerHTML = '';
      for (let s = minSum; s <= maxSum; s++) {
        const theoH = Math.round((theo[s] || 0) / scale * BAR_H);
        const actH  = total > 0 ? Math.round(counts[s] / total / scale * BAR_H) : 0;
        const col = document.createElement('div');
        col.className = 'chart-col';
        col.innerHTML =
          `<div class="chart-bar-area">` +
            `<div class="bar-theo"   style="height:${theoH}px"></div>` +
            `<div class="bar-actual" style="height:${actH}px"></div>` +
          `</div>` +
          `<div class="chart-lbl${(isCatan && s === 7) ? ' seven' : ''}">${s}</div>`;
        chartEl.appendChild(col);
      }

      document.getElementById('stats-title').textContent =
        total === 0 ? 'Statistics' : `Statistics — ${total} roll${total === 1 ? '' : 's'}`;

      const histEl = document.getElementById('history-list');
      if (total === 0) {
        histEl.innerHTML = '<div class="no-rolls">No rolls yet</div>';
        return;
      }
      histEl.innerHTML = '';
      history.slice().reverse().forEach(vs => {
        const s = vs.reduce((a, b) => a + b, 0);
        const row = document.createElement('div');
        row.className = 'history-row';
        row.innerHTML =
          `<span class="hist-dice">${vs.join(' + ')}</span>` +
          `<span class="hist-sum${(isCatan && s === 7) ? ' seven' : ''}">= ${s}</span>`;
        histEl.appendChild(row);
      });
    }

    // ── Dice DOM ──────────────────────────────────────────────────────────────
    const DIE_SIZES = { 1: 150, 2: 130, 3: 90, 4: 70, 5: 56 };
    const ROW_GAPS  = { 1: 0, 2: 32, 3: 20, 4: 12, 5: 8 };
    const cubes  = [];
    const states = [];

    function buildDiceRow() {
      const diceRow = document.getElementById('dice-row');
      diceRow.innerHTML = '';
      cubes.length = 0;
      states.length = 0;

      const size = DIE_SIZES[cfg.n];
      document.documentElement.style.setProperty('--size', size + 'px');
      document.documentElement.style.setProperty('--half', (size / 2) + 'px');
      diceRow.style.gap = ROW_GAPS[cfg.n] + 'px';

      for (let i = 0; i < cfg.n; i++) {
        const wrapper = document.createElement('div');
        wrapper.className = 'die-wrapper';
        const cube = document.createElement('div');
        cube.className = 'cube';
        buildCube(cube, cfg.s);
        wrapper.appendChild(cube);
        diceRow.appendChild(wrapper);
        cubes.push(cube);
        states.push({ x: 0, y: 0, face: 1 });
      }
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    const sumEl = document.getElementById('sum');
    const saved = loadState();
    let cfg     = saved.cfg;
    let pool    = saved.pool ?? freshPool();
    let history = saved.history;
    let locked  = false;

    buildDiceRow();

    // ── Roll ──────────────────────────────────────────────────────────────────
    document.getElementById('roll-area').addEventListener('click', () => {
      if (locked) return;
      locked = true;

      const values = drawRoll(pool);
      history.push([...values]);
      saveState(pool, history);

      sumEl.classList.add('rolling');
      values.forEach((v, i) => {
        let targetFace;
        if (cfg.s === 6) {
          // pip face index matches die value
          targetFace = v;
        } else {
          targetFace = Math.ceil(Math.random() * 6);
          cubes[i].querySelector(`.face-${targetFace} .die-number`).textContent = v;
        }
        rotateTo(cubes[i], states[i], targetFace);
      });

      setTimeout(() => {
        const total = values.reduce((a, b) => a + b, 0);
        sumEl.textContent = total;
        // 7 triggers the robber in Catan — only applies to standard 2d6
        sumEl.style.color = (cfg.n === 2 && cfg.s === 6 && total === 7) ? 'var(--red)' : 'var(--text)';
        sumEl.classList.remove('rolling');
        locked = false;
      }, 800);
    });

    // ── Panel open/close ──────────────────────────────────────────────────────
    const panelBackdrop = document.getElementById('panel-backdrop');
    const statsPanel    = document.getElementById('stats-panel');
    const settingsPanel = document.getElementById('settings-panel');

    function openPanel(panelEl) {
      panelEl.classList.add('open');
      panelBackdrop.classList.add('open');
    }

    function closePanel() {
      statsPanel.classList.remove('open');
      settingsPanel.classList.remove('open');
      panelBackdrop.classList.remove('open');
    }

    panelBackdrop.addEventListener('click', closePanel);
    document.getElementById('stats-handle').addEventListener('click', closePanel);
    document.getElementById('settings-handle').addEventListener('click', closePanel);

    document.getElementById('stats-btn').addEventListener('click', () => {
      renderStats();
      openPanel(statsPanel);
    });

    // ── Confirm modal (shared) ─────────────────────────────────────────────────
    const confirmOverlay = document.getElementById('confirm-overlay');
    let confirmCallback  = null;

    function openConfirm(title, msg, onConfirm) {
      document.querySelector('#confirm-card h2').textContent = title;
      document.querySelector('#confirm-card p').textContent  = msg;
      confirmCallback = onConfirm;
      confirmOverlay.classList.add('open');
    }

    function closeConfirm() {
      confirmOverlay.classList.remove('open');
      confirmCallback = null;
    }

    document.getElementById('btn-cancel').addEventListener('click', closeConfirm);
    document.getElementById('btn-confirm-reset').addEventListener('click', () => {
      confirmCallback?.();
      closeConfirm();
    });

    // ── Reset ─────────────────────────────────────────────────────────────────
    function doReset() {
      pool = freshPool();
      history = [];
      saveState(pool, history);
      sumEl.textContent = '—';
      sumEl.style.color = 'var(--text)';
    }

    document.getElementById('reset-btn').addEventListener('click', () => {
      openConfirm('New game?', 'All rolls and history will be cleared.', () => {
        doReset();
        closePanel();
      });
    });

    // ── Settings ──────────────────────────────────────────────────────────────
    let pendingN = cfg.n;
    let pendingS = cfg.s;

    function updateSettingsUI() {
      document.getElementById('dice-count-display').textContent = pendingN;
      document.getElementById('dice-minus').disabled = pendingN <= 1;
      document.getElementById('dice-plus').disabled  = pendingN >= 5;
      document.querySelectorAll('.die-type-btn').forEach(btn => {
        btn.classList.toggle('active', +btn.dataset.s === pendingS);
      });
    }

    document.getElementById('settings-btn').addEventListener('click', () => {
      pendingN = cfg.n;
      pendingS = cfg.s;
      updateSettingsUI();
      openPanel(settingsPanel);
    });

    document.getElementById('dice-minus').addEventListener('click', () => {
      if (pendingN > 1) { pendingN--; updateSettingsUI(); }
    });

    document.getElementById('dice-plus').addEventListener('click', () => {
      if (pendingN < 5) { pendingN++; updateSettingsUI(); }
    });

    document.querySelectorAll('.die-type-btn').forEach(btn => {
      btn.addEventListener('click', () => { pendingS = +btn.dataset.s; updateSettingsUI(); });
    });

    document.getElementById('settings-apply').addEventListener('click', () => {
      const changed = pendingN !== cfg.n || pendingS !== cfg.s;
      if (!changed) { closePanel(); return; }

      const apply = () => {
        cfg.n = pendingN;
        cfg.s = pendingS;
        buildDiceRow();
        doReset();
        closePanel();
      };

      if (history.length > 0) {
        openConfirm(
          `Switch to ${pendingN}d${pendingS}?`,
          'All rolls and history will be cleared.',
          apply
        );
      } else {
        apply();
      }
    });

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
  </script>
</body>
</html>
